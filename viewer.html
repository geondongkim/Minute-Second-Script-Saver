<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams Captions Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1e1e2e;
      --surface: #313244;
      --border:  #45475a;
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --accent:  #cba6f7;
      --green:   #a6e3a1;
      --red:     #f38ba8;
      --blue:    #89b4fa;
      --pink:    #f5c2e7;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #181825;
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-bar h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      margin-right: 6px;
    }

    .live-badge {
      display: none;
      background: var(--green);
      color: #1e1e2e;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .live-badge.visible { display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .search-box {
      flex: 1;
      min-width: 150px;
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    .top-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: var(--accent); color: #1e1e2e; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-green     { background: var(--green); color: #1e1e2e; }

    /* ── 발화자 필터 ── */
    .speaker-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: #181825;
    }
    .speaker-filters:empty { display: none; }
    .speaker-chip {
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, border-color .15s;
    }
    .speaker-chip.active {
      background: var(--accent);
      color: #1e1e2e;
      border-color: var(--accent);
    }
    .speaker-chip-all.active {
      background: var(--blue);
      color: #1e1e2e;
      border-color: var(--blue);
    }

    /* ── 메타 정보 ── */
    .meta-bar {
      padding: 8px 20px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .meta-bar span b { color: var(--text); }

    /* ── 자막 목록 ── */
    .captions-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 16px 20px 80px;
    }

    .caption-entry {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 10px;
      border-left: 3px solid transparent;
      transition: background .1s;
    }
    .caption-entry.hidden { display: none; }

    .caption-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 2px;
      flex-shrink: 0;
      min-width: 60px;
    }

    .caption-body { flex: 1; min-width: 0; }
    .caption-name {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .caption-text { font-size: 13px; line-height: 1.55; word-break: break-word; }

    .copy-btn {
      opacity: 0;
      flex-shrink: 0;
      padding: 3px 7px;
      background: var(--border);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text);
      font-family: inherit;
      align-self: flex-start;
      transition: opacity .15s, background .15s;
    }
    .caption-entry:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--accent); color: #1e1e2e; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 2;
    }

    /* ── 발화자 색상 (최대 8명) ── */
    .color-0 { border-left-color: #cba6f7; } .color-0 .caption-name { color: #cba6f7; }
    .color-1 { border-left-color: #89b4fa; } .color-1 .caption-name { color: #89b4fa; }
    .color-2 { border-left-color: #a6e3a1; } .color-2 .caption-name { color: #a6e3a1; }
    .color-3 { border-left-color: #f38ba8; } .color-3 .caption-name { color: #f38ba8; }
    .color-4 { border-left-color: #fab387; } .color-4 .caption-name { color: #fab387; }
    .color-5 { border-left-color: #89dceb; } .color-5 .caption-name { color: #89dceb; }
    .color-6 { border-left-color: #f5c2e7; } .color-6 .caption-name { color: #f5c2e7; }
    .color-7 { border-left-color: #a6adc8; } .color-7 .caption-name { color: #a6adc8; }

    /* ── 히스토리 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 480px;
      max-width: 95vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 14px; color: var(--accent); }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; }
    .modal-body { overflow-y: auto; padding: 12px 16px; }

    .session-item {
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: background .15s;
    }
    .session-item:hover { background: var(--border); }
    .session-item .s-title { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .s-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .session-empty { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }
  </style>
</head>
<body>

  <!-- 상단 바 -->
  <div class="top-bar">
    <h1 id="viewerTitle">Teams Captions Viewer</h1>
    <span class="live-badge" id="liveBadge">● LIVE</span>
    <input type="search" class="search-box" id="searchInput" placeholder="검색 (이름 또는 내용)…">
    <div class="top-actions">
      <button class="btn btn-secondary" id="historyBtn">📋 히스토리</button>
      <button class="btn btn-secondary" id="copyAllBtn">📄 전체 복사</button>
      <button class="btn btn-green"     id="saveAllBtn">💾 전체 저장</button>
    </div>
  </div>

  <!-- 발화자 필터 -->
  <div class="speaker-filters" id="speakerFilters"></div>

  <!-- 메타 정보 -->
  <div class="meta-bar" id="metaBar" style="display:none">
    <span>문장 <b id="metaCount">0</b></span>
    <span>발화자 <b id="metaSpeakers">0</b>명</span>
    <span id="metaTitleSpan"></span>
  </div>

  <!-- 자막 목록 -->
  <div class="captions-wrap">
    <div id="captionsContainer">
      <div class="empty-state">자막 데이터를 불러오는 중…</div>
    </div>
  </div>

  <!-- 히스토리 모달 -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal">
      <div class="modal-header">
        <h2>세션 히스토리</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="sessionList">
        <div class="session-empty">저장된 세션이 없습니다.</div>
      </div>
    </div>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
