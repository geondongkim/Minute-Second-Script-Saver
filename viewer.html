<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams Captions Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1e1e2e;
      --surface: #313244;
      --border:  #45475a;
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --accent:  #cba6f7;
      --green:   #a6e3a1;
      --red:     #f38ba8;
      --blue:    #89b4fa;
      --pink:    #f5c2e7;
      --teal:    #89dceb;
    }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 상단 바 ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #181825;
      border-bottom: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .top-bar h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .live-badge {
      display: none;
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      background: rgba(243,139,168,.15);
      border: 1px solid var(--red);
      border-radius: 20px;
      padding: 2px 8px;
      animation: blink 1.5s infinite;
      flex-shrink: 0;
    }
    .live-badge.visible { display: inline; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── 뷰어 탭 바 ── */
    .viewer-tab-bar {
      display: flex;
      background: #181825;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }
    .vtab {
      flex: 1;
      padding: 9px 6px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .vtab:hover { color: var(--text); }
    .vtab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── 탭 패널 ── */
    .vtab-pane { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .vtab-pane.active { display: flex; }

    /* ── 버튼 ── */
    .btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-green     { background: var(--green);   color: #1e1e2e; }
    .btn-primary   { background: var(--accent);  color: #1e1e2e; }
    .btn-icon { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 4px 5px; }
    .btn-icon:hover { color: var(--text); }

    /* ── 원문 탭 툴바 ── */
    .transcript-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-box {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    /* ── 발화자 필터 ── */
    .speaker-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .speaker-chip {
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: background .15s;
    }
    .speaker-chip.active { background: var(--accent); color: #1e1e2e; border-color: var(--accent); font-weight: 700; }

    /* ── 메타 바 ── */
    .meta-bar {
      font-size: 11px;
      color: var(--muted);
      padding: 5px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    /* ── 자막 스크롤 영역 ── */
    .captions-wrap { flex: 1; overflow-y: auto; padding: 10px 14px; }

    /* ── 자막 항목 ── */
    .caption-entry {
      padding: 7px 10px 7px 14px;
      border-left: 3px solid var(--border);
      margin-bottom: 6px;
      border-radius: 0 6px 6px 0;
      background: var(--surface);
    }
    .caption-entry.hidden { display: none; }
    .caption-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .caption-name   { font-size: 12px; font-weight: 700; }
    .caption-time   { font-size: 11px; color: var(--muted); }
    .caption-text   { font-size: 13px; line-height: 1.5; }
    .empty-state    { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }

    /* ── 발화자 색상 ── */
    .color-0 { border-left-color: #cba6f7; } .color-0 .caption-name { color: #cba6f7; }
    .color-1 { border-left-color: #89b4fa; } .color-1 .caption-name { color: #89b4fa; }
    .color-2 { border-left-color: #a6e3a1; } .color-2 .caption-name { color: #a6e3a1; }
    .color-3 { border-left-color: #f38ba8; } .color-3 .caption-name { color: #f38ba8; }
    .color-4 { border-left-color: #fab387; } .color-4 .caption-name { color: #fab387; }
    .color-5 { border-left-color: #89dceb; } .color-5 .caption-name { color: #89dceb; }
    .color-6 { border-left-color: #f5c2e7; } .color-6 .caption-name { color: #f5c2e7; }
    .color-7 { border-left-color: #a6adc8; } .color-7 .caption-name { color: #a6adc8; }

    /* ── 발화자별 탭 ── */
    .speaker-group { margin-bottom: 18px; }
    .speaker-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border-radius: 8px 8px 0 0;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .speaker-group-name  { font-size: 14px; font-weight: 700; }
    .speaker-group-count { font-size: 11px; color: var(--muted); }
    .speaker-group-lines { background: var(--surface); border-radius: 0 0 8px 8px; overflow: hidden; }
    .speaker-line {
      padding: 7px 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      gap: 12px;
    }
    .speaker-line-time { font-size: 11px; color: var(--muted); flex-shrink: 0; margin-top: 2px; min-width: 52px; }

    /* ── AI 요약 탭 ── */
    .ai-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* AI 설정 (접이식) */
    .ai-settings-section {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .ai-settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
    }
    .ai-settings-header-left { display: flex; align-items: center; gap: 8px; }
    .ai-provider-chip {
      font-size: 11px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 9px;
      color: var(--accent);
      font-weight: 700;
    }
    .ai-model-chip { font-size: 11px; color: var(--muted); }
    .ai-settings-toggle-btn {
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
    }
    .ai-settings-body {
      display: none;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      flex-direction: column;
      gap: 10px;
    }
    .ai-settings-body.open { display: flex; }

    /* 폼 요소 */
    .form-row { display: flex; flex-direction: column; gap: 5px; }
    .form-row label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .form-row select,
    .form-row input[type="text"],
    .form-row input[type="password"],
    .form-row textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      width: 100%;
      font-family: inherit;
    }
    .form-row select:focus,
    .form-row input:focus,
    .form-row textarea:focus { border-color: var(--accent); }
    .form-row textarea { resize: vertical; min-height: 60px; }

    .provider-section { display: none; }
    .provider-section.active { display: flex; flex-direction: column; gap: 10px; }
    .ai-save-row { display: flex; justify-content: flex-end; }

    /* 참고파일 */
    .ref-file-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ref-file-name { font-size: 12px; color: var(--muted); flex: 1; }
    .ref-file-name.loaded { color: var(--green); }
    .ref-preview-box {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
      max-height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      margin-top: 4px;
    }

    /* 생성 버튼 */
    .summarize-btn-row { display: flex; justify-content: center; }
    .btn-summarize {
      background: var(--accent);
      color: #1e1e2e;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 36px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-summarize:hover { opacity: .88; }
    .btn-summarize:disabled { opacity: .4; cursor: not-allowed; }

    .ai-feedback {
      font-size: 12px;
      color: var(--green);
      text-align: center;
      min-height: 16px;
    }
    .ai-feedback.error { color: var(--red); }

    /* 요약 결과 섹션 */
    .summary-sections { display: none; flex-direction: column; gap: 12px; }
    .summary-section {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .summary-section-header {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(203,166,247,.08);
      border-bottom: 1px solid var(--border);
    }
    .summary-section-body {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.7;
    }
    .summary-section-body ul  { padding-left: 18px; }
    .summary-section-body li  { margin-bottom: 4px; }
    .summary-section-body p   { margin-bottom: 6px; }
    .summary-section-body code {
      background: var(--bg);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .summary-raw {
      display: none;
      background: var(--surface);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }
    .summary-actions {
      display: none;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── 히스토리 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e2e;
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 480px;
      max-width: 95vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2  { font-size: 14px; color: var(--accent); }
    .modal-close      { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; }
    .modal-body       { overflow-y: auto; padding: 12px 16px; }
    .session-item {
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: background .15s;
    }
    .session-item:hover  { background: var(--border); }
    .session-item.teams  { border-left: 3px solid var(--blue); }
    .session-item.vimeo  { border-left: 3px solid #fab387; }
    .session-item.vimeo .s-title { color: #fab387; }
    .session-item .s-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item .s-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .session-section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 10px 0 7px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .session-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .session-section-label:first-child { margin-top: 0; }
    .session-empty { text-align: center; color: var(--muted); padding: 20px; font-size: 13px; }
  </style>
</head>
<body>

  <!-- 상단 바 -->
  <div class="top-bar">
    <h1 id="viewerTitle">Teams Captions Viewer</h1>
    <span class="live-badge" id="liveBadge">● LIVE</span>
    <button class="btn btn-secondary" id="historyBtn" title="세션 히스토리">📋 히스토리</button>
  </div>

  <!-- 뷰어 탭 바 -->
  <div class="viewer-tab-bar">
    <button class="vtab active" data-vtab="transcript">📄 원문</button>
    <button class="vtab" data-vtab="speaker">🗣️ 발화자별</button>
    <button class="vtab" data-vtab="ai">📌 AI 요약</button>
  </div>

  <!-- ════ TAB: 원문 ════ -->
  <div class="vtab-pane active" id="vpane-transcript">
    <div class="transcript-toolbar">
      <input type="search" class="search-box" id="searchInput" placeholder="검색 (이름 또는 내용)…">
      <button class="btn btn-secondary" id="copyAllBtn">📄 전체 복사</button>
      <button class="btn btn-green"     id="saveAllBtn">💾 저장</button>
    </div>
    <div class="speaker-filters" id="speakerFilters"></div>
    <div class="meta-bar" id="metaBar" style="display:none">
      <span>문장 <b id="metaCount">0</b></span>
      <span>발화자 <b id="metaSpeakers">0</b>명</span>
      <span id="metaTitleSpan"></span>
    </div>
    <div class="captions-wrap">
      <div id="captionsContainer">
        <div class="empty-state">자막 데이터를 불러오는 중…</div>
      </div>
    </div>
  </div>

  <!-- ════ TAB: 발화자별 ════ -->
  <div class="vtab-pane" id="vpane-speaker">
    <div class="captions-wrap">
      <div id="speakerContainer">
        <div class="empty-state">원문 탭에서 자막을 먼저 로드하세요.</div>
      </div>
    </div>
  </div>

  <!-- ════ TAB: AI 요약 ════ -->
  <div class="vtab-pane" id="vpane-ai">
    <div class="ai-wrap">

      <!-- AI 설정 (접이식) -->
      <div class="ai-settings-section">
        <div class="ai-settings-header" id="aiSettingsHeader">
          <div class="ai-settings-header-left">
            <span class="ai-provider-chip" id="viewerProviderChip">Gemini</span>
            <span class="ai-model-chip"    id="viewerModelChip">gemini-2.5-flash</span>
          </div>
          <button class="ai-settings-toggle-btn" id="aiSettingsToggleBtn">설정 ▾</button>
        </div>
        <div class="ai-settings-body" id="aiSettingsBody">
          <div class="form-row">
            <label>AI 제공자</label>
            <select id="viewerProviderSelect">
              <option value="gemini">Gemini</option>
              <option value="openai">OpenAI</option>
            </select>
          </div>

          <!-- Gemini 설정 -->
          <div class="provider-section active" id="viewerGeminiSection">
            <div class="form-row">
              <label>Gemini API 키 (여러 개: 쉼표로 구분)</label>
              <input type="password" id="viewerGeminiKeys" placeholder="AIza…">
            </div>
            <div class="form-row">
              <label>모델</label>
              <select id="viewerGeminiModel">
                <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
                <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
                <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
              </select>
            </div>
          </div>

          <!-- OpenAI 설정 -->
          <div class="provider-section" id="viewerOpenaiSection">
            <div class="form-row">
              <label>OpenAI API 키 (여러 개: 쉼표로 구분)</label>
              <input type="password" id="viewerOpenaiKeys" placeholder="sk-…">
            </div>
            <div class="form-row">
              <label>모델</label>
              <select id="viewerOpenaiModel">
                <option value="gpt-5.5">gpt-5.5</option>
                <option value="gpt-5.4">gpt-5.4</option>
                <option value="gpt-5.4-mini" selected>gpt-5.4-mini</option>
                <option value="gpt-4.1">gpt-4.1</option>
                <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                <option value="gpt-4.1-nano">gpt-4.1-nano</option>
                <option value="gpt-4o">gpt-4o</option>
                <option value="gpt-4o-mini">gpt-4o-mini</option>
                <option value="o4-mini">o4-mini</option>
                <option value="o3-mini">o3-mini</option>
              </select>
            </div>
          </div>

          <div class="ai-save-row">
            <button class="btn btn-primary" id="viewerAiSaveBtn">저장</button>
          </div>
        </div>
      </div>

      <!-- 회의 유형 -->
      <div class="form-row">
        <label>회의 유형</label>
        <select id="viewerMeetingType">
          <option value="general">일반 회의</option>
          <option value="standup">스탠드업</option>
          <option value="retro">회고 (Retro)</option>
          <option value="planning">플래닝</option>
          <option value="executive">경영진 회의</option>
          <option value="interview">인터뷰</option>
          <option value="brainstorm">브레인스토밍</option>
          <option value="review">리뷰 회의</option>
          <option value="1on1">1:1 미팅</option>
          <option value="lecture">라이브 강의</option>
          <option value="custom">커스텀 프롬프트</option>
        </select>
      </div>
      <div class="form-row" id="viewerCustomRow" style="display:none">
        <label>커스텀 프롬프트</label>
        <textarea id="viewerCustomPrompt" rows="3" placeholder="요약 지시사항을 입력하세요…"></textarea>
      </div>

      <!-- 추가 지시사항 (항상 표시) -->
      <div class="form-row">
        <label>추가 지시사항 <span style="color:var(--muted);font-weight:400">(선택)</span></label>
        <textarea id="viewerAdditionalPrompt" rows="2" placeholder="예: 3줄 이내로 / 영어로 번역 / 핵심만 / 기술 용어 설명 포함"></textarea>
      </div>

      <!-- 참고파일 첨부 -->
      <div class="form-row">
        <label>📎 참고자료 첨부 <span style="color:var(--muted);font-weight:400">(MD, TXT, PDF — 강의자료·안건 등)</span></label>
        <div class="ref-file-row">
          <input type="file" id="refFileInput" accept=".md,.txt,.pdf,.csv" multiple style="display:none">
          <button class="btn btn-secondary" id="refFileBtn">파일 선택</button>
          <span class="ref-file-name" id="refFileName">선택된 파일 없음</span>
          <button class="btn-icon" id="refFileClearBtn" title="제거" style="display:none">✕</button>
        </div>
        <div class="ref-preview-box" id="refPreviewBox"></div>
      </div>

      <!-- 생성 버튼 -->
      <div class="summarize-btn-row">
        <button class="btn-summarize" id="viewerSummarizeBtn">📌 AI 요약 생성</button>
      </div>
      <div class="ai-feedback" id="viewerAiFeedback"></div>

      <!-- 결과: 3섹션 -->
      <div class="summary-sections" id="summarySections">
        <div class="summary-section">
          <div class="summary-section-header">📌 주요 안건</div>
          <div class="summary-section-body" id="sectionAgenda"></div>
        </div>
        <div class="summary-section">
          <div class="summary-section-header">🗣️ 핵심 논의 내용</div>
          <div class="summary-section-body" id="sectionDiscussion"></div>
        </div>
        <div class="summary-section">
          <div class="summary-section-header">✅ Action Items</div>
          <div class="summary-section-body" id="sectionActions"></div>
        </div>
      </div>

      <!-- 결과 fallback (섹션 파싱 실패 시) -->
      <div class="summary-raw" id="summaryRaw"></div>

      <!-- 결과 액션 버튼 -->
      <div class="summary-actions" id="summaryActions">
        <button class="btn btn-secondary" id="viewerCopyBtn">📄 복사</button>
        <button class="btn btn-green"     id="viewerSaveBtn">💾 저장 (.md)</button>
      </div>

    </div>
  </div>

  <!-- 히스토리 모달 -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal">
      <div class="modal-header">
        <h2>세션 히스토리</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="sessionList">
        <div class="session-empty">저장된 세션이 없습니다.</div>
      </div>
    </div>
  </div>

  <script src="pdf.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
